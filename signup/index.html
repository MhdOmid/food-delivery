<!doctype html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ثبت نام | مک دونالد</title>
    <link href="/public/styles/login.css" rel="stylesheet" />
    <link rel="stylesheet" href="/public/styles/custom.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>
  <body class="body-sign_in">
    <audio class="success" src="audios/done.mp3"></audio>
    <audio class="failed" src="audios/error.mp3"></audio>
    <a href="/"><img src="/public/images/lgo.svg" /></a>
    <form class="form-sign_in" id="form" name="form1" method="post">
      <h1>ثبت نام کنید</h1>
      <input
        type="text"
        id="realname"
        name="realname"
        placeholder="نام کامل خود را وارد کنید"
      /><br />
      <input
        type="text"
        id="username"
        name="username"
        placeholder="نام کاربری خود را وارد کنید"
      /><br />
      <input
        type="password"
        id="password"
        name="password"
        placeholder="گذرواژه خود را وارد کنید"
      /><br />
      <input
        type="email"
        id="email"
        name="email"
        placeholder="ایمیل خود را وارد کنید"
      /><br />
      <input type="submit" value="ثبت نام" class="submit-btn" /><br />
      <p>
        شما از قبل حساب دارید؟<a href="/signin" style="margin-right: 4px"
          >وارد شوید</a
        >
      </p>
      <p></p>
    </form>

    <div class="toast-wrapper">
      <!-- Data Loded By JS -->
    </div>
    
    <script src="/public/scripts/signup.js" type="module"></script>
  </body>
</html>
