<!doctype html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مک دونالد - مدیریت کاربران</title>
    <link rel="stylesheet" href="../../../public/styles/admin.css" />
    <link rel="stylesheet" href="../../../public/styles/custom.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="../../../public/images/favicon2.png">
  </head>

  <body onload="getUserPageData()">
    <audio class="success" src="../../../public/audios/done.mp3"></audio>
    <audio class="failed" src="../../../public/audios/error.mp3"></audio>
    <div class="main-box">
      <!-- main content -->
      <main>
        <!-- Sidebar -->
        <aside class="sidebar">
          <header>
            <a href="../">
              <img src="../../../public/images/lgo.svg" class="website-logo" alt="" />
            </a>
          </header>
          <main class="side-menu">
            <ul class="side-container">
              <li>
                <a href="./../../" class="navlink">
                  <span class="navicon"><i class="fa-solid fa-house"></i></span>
                  <span class="title">داشبورد</span>
                </a>
              </li>
              <!-- products -->
              <li>
                <a href="./../products/" class="navlink">
                  <span class="navicon"><i class="fa-solid fa-box"></i></span>
                  <span class="title">محصولات</span>
                </a>
              </li>
              <li>
                <a href="#" class="navlink active">
                  <span class="navicon"><i class="fa-solid fa-users"></i></span>
                  <span class="title">کاربران</span>
                </a>
              </li>
            </ul>
          </main>
          <footer></footer>
          <button class="toggle-sidebar">
            <!-- Arrow Right -->
            <i class="fa-solid fa-angle-left"></i>
          </button>
        </aside>

        <!-- Content -->
        <section class="content">
          <!-- breadcrumbs -->
          <div class="breadcrumbs">
            <a href="/admin/" class="breadcrumb">صفحه اصلی</a>
            <span class="backslack"> / </span>
            <a href="/admin/dashboard/users/"> کاربران </a>
          </div>

          <!-- Table -->
          <div class="table-component">
            <i class="ui-border emerald top"></i>
            <!-- Table Header -->
            <div class="section-header">
              <div>
                <p class="title-text">لیست کاربران</p>
                <p class="users-count-text caption-text">
                  <span class="users-data">0</span>
                  <span>کاربر ثبت نام کرده اند</span>
                </p>
              </div>
              <button href="#" id="create-user" class="section-link">
                <span>
                  <span> ایجاد کاربر </span>
                  <!-- Plus icon -->
                  <i class="fa-solid fa-plus"></i>
                </span>
              </button>
            </div>

            <!-- Table Head row -->
            <div class="table-head-row">
              <p>نام و نام خانوادگی</p>
              <p>نام کاربری</p>
              <p>آدرس ایمیل</p>
              <p>گذرواژه</p>
              <p>تاریخ ایجاد</p>
              <p>دسترسی</p>
              <p>مدیریت</p>
            </div>

            <!-- Table body (content) -->
            <div class="table-body users">
              <!-- Data Loded From JS -->
            </div>

            <!-- Table Footer  -->
            <div class="table-footer">
              <!-- Pagination -->
              <div class="pagination">
                <!-- Data Loded From JS -->
              </div>
            </div>
          </div>
        </section>
      </main>
      <div class="toast-wrapper">
        <!-- Data Loded By JS -->
      </div>

      <div class="modal-screen hidden">
        <form class="modal">
          <header class="modal-header">
            <h3>ویرایش اطلاعات کاربر</h3>
            <button class="close-modal">
              <i class="fas fa-times"></i>
            </button>
          </header>
          <main class="modal-content">
            <input
              type="text"
              class="modal-input"
              placeholder="نام و نام خانوادگی را وارد نمائید ..."
              id="user-fullName"
            />
            <input
              type="number"
              class="modal-input"
              id="user-username"
              placeholder="نام کاربری را وارد نمائید ..."
            />
            <input
              type="email"
              class="modal-input"
              id="user-email"
              placeholder="ایمیل را وارد نمائید ..."
            />
            <input
              type="email"
              class="modal-input"
              id="user-password"
              placeholder="رمز عبور را وارد نمائید ..."
            />
          </main>
          <footer class="modal-footer">
            <button class="cancel">انصراف</button>
            <button class="submit">تائید</button>
          </footer>
        </form>
      </div>

      <button class="theme-button">
        <!-- Moon icon -->
        <!-- <i class="fas fa-moon"></i> -->
        <!-- Sun icon -->
        <i class="fas fa-sun"></i>
      </button>
      <!-- Data Loded By JS -->
    </div>
    <h1 class="error-box">لطفا گزینه سایت مخصوص دسکتاپ را فعال کنید</h1>
    <div class="loading-box">
      <h1>در حال بارگزاری</h1>
      <div class="loader"></div>
    </div>
    <script src="../../../public/scripts/admin.js" type="module"></script>
  </body>
</html>
