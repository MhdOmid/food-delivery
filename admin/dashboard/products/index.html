<!doctype html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مک دونالد - مدیریت محصولات</title>
    <link rel="stylesheet" href="../../../public/styles/admin.css" />
    <link rel="stylesheet" href="../../../public/styles/custom.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="icon" type="image/png" href="../../../public/images/favicon2.png">
  </head>

  <body onload="getFoodPageData()">
    <audio class="success" src="../../../public/audios/done.mp3"></audio>
    <audio class="failed" src="../../../public/audios/error.mp3"></audio>
    <div class="main-box">
      <!-- main content -->
      <main>
        <!-- Sidebar -->
        <aside class="sidebar">
          <header>
            <a href="../">
              <img src="../../../public/images/lgo.svg" class="website-logo" alt="" />
            </a>
          </header>
          <main class="side-menu">
            <ul class="side-container">
              <li>
                <a href="./../../" class="navlink">
                  <span class="navicon"><i class="fa-solid fa-house"></i></span>
                  <span class="title">داشبورد</span>
                </a>
              </li>
              <!-- Products -->
              <li>
                <a href="#" class="navlink active">
                  <span class="navicon"><i class="fa-solid fa-box"></i></span>
                  <span class="title">محصولات</span>
                </a>
              </li>
              <li>
                <a href="./../users/" class="navlink">
                  <span class="navicon"><i class="fa-solid fa-users"></i></span>
                  <span class="title">کاربران</span>
                </a>
              </li>
            </ul>
          </main>
          <footer></footer>
          <button class="toggle-sidebar">
            <!-- Arrow Right -->
            <i class="fa-solid fa-angle-left"></i>
          </button>
        </aside>

        <!-- Content -->
        <section class="content">
          <!-- breadcrumbs -->
          <div class="breadcrumbs">
            <a href="/admin/" class="breadcrumb">صفحه اصلی</a>
            <span class="backslack"> / </span>
            <a href="/admin/dashboard/products/">محصولات</a>
          </div>

          <!-- Table -->
          <div class="table-component">
            <i class="ui-border emerald top"></i>
            <!-- Table Header -->
            <div class="section-header">
              <div>
                <p class="title-text">لیست محصولات</p>
                <p class="products-count-text caption-text">
                  <span class="products-data">0</span>
                  <span> محصول در وبسایت شما وجود دارد </span>
                </p>
              </div>
              <button id="create-product" class="section-link">
                <span>
                  <span> ایجاد محصول </span>
                  <!-- Plus icon -->
                  <i class="fa-solid fa-plus"></i>
                </span>
              </button>
            </div>

            <!-- Table Head row -->
            <div class="table-head-row">
              <p>عنوان محصول</p>
              <p>توضیحات محصول</p>
              <p>قیمت محصول</p>
              <p>دسته بندی</p>
              <p>تاریخ ایجاد</p>
              <p>تصویر محصول</p>
              <p>مدیریت</p>
            </div>

            <!-- Table body (content) -->
            <div class="table-body products">
              <!-- Data Loded From JS -->
            </div>

            <!-- Table Footer  -->
            <div class="table-footer">
              <!-- Pagination -->
              <div class="pagination"></div>
            </div>
          </div>
        </section>
      </main>
      <div class="toast-wrapper">
        <!-- Data Loded By JS -->
      </div>

      <div class="modal-screen hidden">
        <form class="modal" name="register">
          <!-- Data Loded From JS -->
        </form>
      </div>

      <button class="theme-button">
        <!-- Moon icon -->
        <!-- <i class="fas fa-moon"></i> -->
        <!-- Sun icon -->
        <i class="fas fa-sun"></i>
      </button>

      <!-- Data Loded By JS -->
    </div>
    <h1 class="error-box">لطفا گزینه سایت مخصوص دسکتاپ را فعال کنید</h1>
    <div class="loading-box">
      <h1>در حال بارگزاری</h1>
      <div class="loader"></div>
    </div>
    <script src="../../../public/scripts/admin.js" type="module"></script>
  </body>
</html>
